<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Shop Của Bạn</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #eee; border: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        button.submit-btn { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .grid-numbers { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 10px; }
        .num-btn { padding: 5px; text-align: center; background: #e0e0e0; border: none; cursor: pointer; border-radius: 3px; }
        .num-btn.selected { background: #ffc107; color: black; font-weight: bold; }
        .user-info { background: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .qr-container { text-align: center; margin-top: 15px; padding: 15px; background: #f8f9fa; border: 2px dashed #007bff; border-radius: 8px; display: none; }
        .qr-image { max-width: 200px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .qr-money-text { font-size: 18px; color: #dc3545; font-weight: bold; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box" class="user-info">
        <h3>Đăng Nhập / Đăng Ký</h3>
        <div class="form-group">
            <input type="text" id="username" placeholder="Nhập tên tài khoản của bạn...">
            <button onclick="login()" style="margin-top: 5px; width: 100%; padding: 5px;">Vào Hệ Thống</button>
        </div>
    </div>

    <div id="shop-box" style="display: none;">
        <div class="user-info">
            Chào, <strong id="display-user">Chưa rõ</strong> | Số dư: <strong style="color: green;"><span id="display-balance">0</span> VNĐ</strong>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab1')" id="title-tab1">Tab 1</button>
            <button class="tab-btn" onclick="switchTab('tab2')" id="title-tab2">Tab 2</button>
            <button class="tab-btn" onclick="switchTab('tab-nap')">Nạp Tiền</button>
            <button class="tab-btn" onclick="switchTab('tab-rut')">Nhận Tiền (Rút)</button>
        </div>

        <div id="tab1" class="tab-content active">
            <h3>Chọn số từ 1 đến 99</h3>
            <div class="form-group">
                <label>Số tiền tự ghi (VNĐ):</label>
                <input type="number" id="money-tab1" placeholder="Nhập số tiền đặt...">
            </div>
            <label>Chọn số:</label>
            <div class="grid-numbers" id="grid-tab1"></div>
            <button class="submit-btn" style="margin-top: 15px;" onclick="buyNumber('tab1')">Xác Nhận Mua</button>
        </div>

        <div id="tab2" class="tab-content">
            <h3>Chọn số từ 1 đến 99</h3>
            <div class="form-group">
                <label>Số tiền tự ghi (VNĐ):</label>
                <input type="number" id="money-tab2" placeholder="Nhập số tiền đặt...">
            </div>
            <label>Chọn số:</label>
            <div class="grid-numbers" id="grid-tab2"></div>
            <button class="submit-btn" style="margin-top: 15px;" onclick="buyNumber('tab2')">Xác Nhận Mua</button>
        </div>

        <div id="tab-nap" class="tab-content">
            <h3>Yêu Cầu Nạp Tiền</h3>
            <div class="form-group">
                <label>Số tiền muốn nạp (VNĐ):</label>
                <input type="number" id="deposit-amount" placeholder="Nhập số tiền..." oninput="showQRCode()">
            </div>
            <div id="qr-area" class="qr-container">
                <p style="margin: 0; font-weight: bold;">Quét mã thanh toán đúng số tiền:</p>
                <div class="qr-money-text"><span id="qr-money-val">0</span> VNĐ</div>
                <img class="qr-image" src="https://i.postimg.cc/W3D3Yqgg/Anh-chup-man-hinh-2026-05-31-155424.png" alt="Mã QR Nạp Tiền">
            </div>
            <button class="submit-btn" style="margin-top: 15px;" onclick="requestDeposit()">Gửi Yêu Cầu Nạp</button>
        </div>

        <div id="tab-rut" class="tab-content">
            <h3>Yêu Cầu Nhận Tiền</h3>
            <div class="form-group">
                <label>Số tài khoản (STK):</label>
                <input type="text" id="withdraw-stk" placeholder="Nhập STK ngân hàng...">
            </div>
            <div class="form-group">
                <label>Ngân hàng:</label>
                <input type="text" id="withdraw-bank" placeholder="Ví dụ: MB, Vietcombank...">
            </div>
            <div class="form-group">
                <label>Số tiền muốn nhận (VNĐ):</label>
                <input type="number" id="withdraw-amount" placeholder="Nhập số tiền muốn rút...">
            </div>
            <button class="submit-btn" style="background: #dc3545;" onclick="requestWithdraw()">Gửi Yêu Cầu Nhận Tiền</button>
        </div>
    </div>
</div>

<script>
    // ========================================================
    // ĐOẠN DƯỚI NÀY BẠN XÓA ĐI VÀ DÁN ĐOẠN CONFIG CỦA BẠN VÀO NHÉ
    // ========================================================
   const firebaseConfig = {
    apiKey: "AIzaSyB7TrarB3yaNknyXMP8xw1ouG0UvM2BGTk",
    authDomain: "kinh-a64f4.firebaseapp.com",
    projectId: "kinh-a64f4",
    storageBucket: "kinh-a64f4.firebasestorage.app",
    messagingSenderId: "698598635550",
    appId: "1:698598635550:web:7173d8b9034521fd0fd60f",
    measurementId: "G-0JF7X9KK5E"
  };
    // ========================================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = "";
    let selectedNumTab1 = null;
    let selectedNumTab2 = null;

    // Lắng nghe đổi tên Tab từ Admin toàn thời gian
    database.ref('config/tab1-name').on('value', (snapshot) => {
        if(snapshot.val()) document.getElementById('title-tab1').innerText = snapshot.val();
    });
    database.ref('config/tab2-name').on('value', (snapshot) => {
        if(snapshot.val()) document.getElementById('title-tab2').innerText = snapshot.val();
    });

    function generateNumbers(targetId, tabStr) {
        let grid = document.getElementById(targetId);
        grid.innerHTML = "";
        for(let i=1; i<=99; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i < 10 ? '0'+i : i;
            btn.onclick = () => {
                document.querySelectorAll(`#${targetId} .num-btn`).forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                if(tabStr === 'tab1') selectedNumTab1 = i;
                else selectedNumTab2 = i;
            };
            grid.appendChild(btn);
        }
    }
    generateNumbers('grid-tab1', 'tab1');
    generateNumbers('grid-tab2', 'tab2');

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function login() {
        let user = document.getElementById('username').value.trim();
        if(!user) return alert("Vui lòng nhập tên tài khoản!");
        currentUser = user;

        database.ref('users/' + currentUser).on('value', (snapshot) => {
            let balance = snapshot.val();
            if (balance === null) {
                database.ref('users/' + currentUser).set(0);
                balance = 0;
            }
            document.getElementById('display-balance').innerText = Number(balance).toLocaleString('vi-VN');
        });

        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('shop-box').style.display = 'block';
        document.getElementById('display-user').innerText = currentUser;
    }

    function showQRCode() {
        let amount = document.getElementById('deposit-amount').value;
        let qrArea = document.getElementById('qr-area');
        let qrMoneyVal = document.getElementById('qr-money-val');
        if (amount && amount > 0) {
            qrMoneyVal.innerText = Number(amount).toLocaleString('vi-VN');
            qrArea.style.display = 'block';
        } else {
            qrArea.style.display = 'none';
        }
    }

    function buyNumber(tab) {
        let money = document.getElementById(`money-${tab}`).value;
        let num = tab === 'tab1' ? selectedNumTab1 : selectedNumTab2;
        let tabName = document.getElementById(`title-${tab}`).innerText;
        if(!money || !num) return alert("Vui lòng nhập tiền và chọn số!");
        
        database.ref('admin_logs').push({
            user: currentUser,
            type: `Mua số (${tabName})`,
            details: `Số chọn: ${num} - Tiền cược: ${Number(money).toLocaleString('vi-VN')}đ`,
            status: 'Chờ duyệt',
            time: new Date().toLocaleString()
        });
        alert("Gửi đơn mua thành công! Chờ Admin phê duyệt.");
    }

    function requestDeposit() {
        let amount = document.getElementById('deposit-amount').value;
        if(!amount || amount <= 0) return alert("Vui lòng nhập tiền hợp lệ!");
        
        database.ref('admin_logs').push({
            user: currentUser,
            type: 'Nạp Tiền',
            details: `Yêu cầu nạp: ${Number(amount).toLocaleString('vi-VN')}đ`,
            status: 'Chờ duyệt',
            time: new Date().toLocaleString()
        });
        document.getElementById('deposit-amount').value = '';
        document.getElementById('qr-area').style.display = 'none';
        alert("Đã gửi thông báo nạp tiền tới Admin!");
    }

    function requestWithdraw() {
        let stk = document.getElementById('withdraw-stk').value;
        let bank = document.getElementById('withdraw-bank').value;
        let amount = document.getElementById('withdraw-amount').value;
        if(!stk || !bank || !amount) return alert("Vui lòng điền đầy đủ thông tin!");
        
        database.ref('admin_logs').push({
            user: currentUser,
            type: 'Rút Tiền',
            details: `STK: ${stk} | Ngân hàng: ${bank} | Số tiền nhận: ${Number(amount).toLocaleString('vi-VN')}đ`,
            status: 'Chờ duyệt',
            time: new Date().toLocaleString()
        });
        alert("Yêu cầu nhận tiền đã được gửi!");
    }
</script>
</body>
</html>
