<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Admin Chuyên Nghiệp</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 25px; margin: 0; }
        .wrapper { max-width: 1200px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 12px; }
        h2 { border-bottom: 2px solid #3b82f6; padding-bottom: 10px; color: white; margin-top: 0; }
        .setting-box { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .setting-box input { padding: 8px; border-radius: 4px; border: none; margin-right: 10px; width: 140px; }
        .setting-box button { padding: 8px 15px; background: #3b82f6; border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e293b; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: left; }
        th { background: #3b82f6; color: white; }
        .btn-win { padding: 5px 10px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-lose { padding: 5px 10px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 3px; }
        .btn-withdraw { padding: 6px 12px; background: #a855f7; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .input-money { padding: 6px; width: 120px; border-radius: 4px; border: 1px solid #cbd5e1; text-align: center; font-weight: bold; }
        .status-pending { color: #f59e0b; font-weight: bold; }
        .status-done { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>BẢNG ĐIỀU KHIỂN QUẢN TRỊ VIÊN</h2>

    <div class="setting-box">
        <h3>Cấu Hình Đổi Tên Cả 3 Thẻ (Tabs) Khách Hàng</h3>
        <label>Tab 1: </label><input type="text" id="input-t1">
        <label>Tab 2: </label><input type="text" id="input-t2">
        <label>Tab 3: </label><input type="text" id="input-t3">
        <button onclick="updateTabs()">Cập Nhật Giao Diện</button>
    </div>

    <h3>Danh Sách Đơn Từ Hệ Thống</h3>
    <table>
        <thead>
            <tr>
                <th>Thời Gian</th>
                <th>Tài Khoản</th>
                <th>Loại Yêu Cầu</th>
                <th>Nội Dung Chi Tiết Đơn Hàng</th>
                <th>Trạng Thái</th>
                <th>Hành Động Xử Lý Đơn Của Admin</th>
            </tr>
        </thead>
        <tbody id="order-list"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
    apiKey: "AIzaSyB7TrarB3yaNknyXMP8xw1ouG0UvM2BGTk",
    authDomain: "kinh-a64f4.firebaseapp.com",
    projectId: "kinh-a64f4",
    storageBucket: "kinh-a64f4.firebasestorage.app",
    messagingSenderId: "698598635550",
    appId: "1:698598635550:web:7173d8b9034521fd0fd60f",
    measurementId: "G-0JF7X9KK5E"
  };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('config').once('value', s => {
        let d = s.val();
        if(d) {
            document.getElementById('input-t1').value = d['tab1-name'] || "Tab 1";
            document.getElementById('input-t2').value = d['tab2-name'] || "Tab 2";
            document.getElementById('input-t3').value = d['tab3-name'] || "Tab 3 (Nhiều Số)";
        }
    });

    function updateTabs() {
        let t1 = document.getElementById('input-t1').value;
        let t2 = document.getElementById('input-t2').value;
        let t3 = document.getElementById('input-t3').value;
        database.ref('config').update({ 'tab1-name': t1, 'tab2-name': t2, 'tab3-name': t3 });
        alert("Đã đổi tên 3 tab thành công!");
    }

    database.ref('server_orders').on('value', snap => {
        let list = snap.val();
        let htmlBody = document.getElementById('order-list'); htmlBody.innerHTML = "";
        if(!list) return;

        Object.keys(list).reverse().forEach(key => {
            let item = list[key];
            let isPending = item.status === 'Chờ duyệt';
            let tr = document.createElement('tr');
            
            let actionHtml = '';
            if(isPending) {
                if(item.type.includes('Mua Số')) {
                    actionHtml = `
                        <input type="number" id="pay-${key}" class="input-money" placeholder="Nhập gốc tiền cược..."><br><br>
                        <button class="btn-win" onclick="processOrder('${key}', '${item.user}', 'win')">Xác Nhận TRÚNG (x2 Ví)</button>
                        <button class="btn-lose" onclick="processOrder('${key}', '${item.user}', 'lose')">Xác Nhận TRƯỢT</button>
                    `;
                } else if(item.type === 'Nạp Tiền') {
                    actionHtml = `
                        <input type="number" id="pay-${key}" class="input-money" placeholder="Nhập số tiền nạp..."><br><br>
                        <button class="btn-win" onclick="processOrder('${key}', '${item.user}', 'deposit')">Xác Nhận Đã Nhận Tiền</button>
                    `;
                } else if(item.type === 'Rút Tiền') {
                    actionHtml = `
                        <input type="number" id="pay-${key}" class="input-money" placeholder="Nhập số tiền trừ..."><br><br>
                        <button class="btn-withdraw" onclick="processOrder('${key}', '${item.user}', 'withdraw')">Xác Nhận Đã Chuyển Tiền</button>
                    `;
                }
            } else {
                actionHtml = `<span style="color:#10b981; font-weight:bold;">✔ Lệnh Đã Đóng</span>`;
            }

            tr.innerHTML = `
                <td><small>${item.time}</small></td>
                <td><b>${item.user}</b></td>
                <td style="color:#60a5fa">${item.type}</td>
                <td>${item.details}</td>
                <td style="color:${isPending ? '#f59e0b':'#10b981'}"><b>${item.status}</b></td>
                <td>${actionHtml}</td>
            `;
            htmlBody.appendChild(tr);
        });
    });

    function processOrder(key, user, mode) {
        let cashInput = document.getElementById(`pay-${key}`).value;
        if(!cashInput || cashInput <= 0) return alert("Vui lòng điền số tiền xử lý!");
        let targetMoney = parseFloat(cashInput);

        database.ref('users_db/' + user + '/balance').once('value', snap => {
            let current = snap.val() || 0;
            let finalBalance = current;
            let logStatus = "";
            let logDetailsUpdate = "";

            if (mode === 'win') {
                // TỰ ĐỘNG NHÂN ĐÔI SỐ TIỀN CƯỢC KHI TRÚNG GIẢI
                let winBonus = targetMoney * 2; 
                finalBalance += winBonus;
                logStatus = 'Trúng Giải 🎉';
                logDetailsUpdate = `[TRÚNG THƯỞNG] Gốc cược: ${targetMoney.toLocaleString('vi-VN')}đ x2 = +${winBonus.toLocaleString('vi-VN')}đ vào tài khoản.`;
            } else if (mode === 'deposit') {
                finalBalance += targetMoney;
                logStatus = 'Đã Duyệt Nạp';
                logDetailsUpdate = `[Thành công] Đã duyệt nạp: +${targetMoney.toLocaleString('vi-VN')}đ.`;
            } else if (mode === 'lose') {
                logStatus = 'Trượt Giải ❌';
                logDetailsUpdate = `[Không Trúng] Đơn mua số không trúng thưởng.`;
            } else if (mode === 'withdraw') {
                finalBalance -= targetMoney;
                logStatus = 'Đã Duyệt Rút';
                logDetailsUpdate = `[Thành công] Đã chuyển khoản thành công: -${targetMoney.toLocaleString('vi-VN')}đ.`;
            }

            // Đồng bộ cập nhật lên hệ thống cơ sở dữ liệu
            database.ref('users_db/' + user).update({ balance: finalBalance });
            database.ref('server_orders/' + key).update({
                status: logStatus,
                details: logDetailsUpdate
            });

            if (mode === 'win') {
                alert(`Đơn hàng của ${user} đã được duyệt TRÚNG! Hệ thống tự động x2 tiền cược và cộng ${ (targetMoney * 2).toLocaleString('vi-VN') }đ vào ví.`);
            } else {
                alert(`Hệ thống đã cập nhật thành công giao dịch cho tài khoản ${user}!`);
            }
        });
    }
</script>
</body>
</html>
