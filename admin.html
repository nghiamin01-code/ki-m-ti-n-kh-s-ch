<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển Admin (Firebase Cloud)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .admin-box { max-width: 1000px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; color: black; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
        .config-section { background: #1a252f; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .btn-action { padding: 5px 10px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>HỆ THỐNG QUẢN LÝ ADMIN (KẾT NỐI REALTIME)</h2>

    <div class="config-section">
        <h3>Thay Đổi Tên Tab Khách Hàng</h3>
        <label>Tên Tab 1:</label> <input type="text" id="admin-tab1-name" placeholder="Tab 1...">
        <label style="margin-left: 20px;">Tên Tab 2:</label> <input type="text" id="admin-tab2-name" placeholder="Tab 2...">
        <button onclick="saveTabNames()" style="padding: 5px 10px; margin-left: 10px; cursor: pointer;">Cập Nhật Tab</button>
    </div>

    <h3>Danh Sách Thông Báo & Đơn Hàng</h3>
    <table>
        <thead>
            <tr>
                <th>Thời Gian</th>
                <th>Khách Hàng</th>
                <th>Hành Động</th>
                <th>Nội Dung Chi Tiết</th>
                <th>Trạng Thái</th>
                <th>Nhập Tiền Xác Nhận</th>
            </tr>
        </thead>
        <tbody id="log-table-body"></tbody>
    </table>
</div>

<script>
    // ========================================================
    // ĐOẠN DƯỚI NÀY BẠN DÁN ĐOẠN CONFIG GIỐNG HỆT NHƯ FILE INDEX.HTML
    // ========================================================
    const firebaseConfig = {
    apiKey: "AIzaSyB7TrarB3yaNknyXMP8xw1ouG0UvM2BGTk",
    authDomain: "kinh-a64f4.firebaseapp.com",
    projectId: "kinh-a64f4",
    storageBucket: "kinh-a64f4.firebasestorage.app",
    messagingSenderId: "698598635550",
    appId: "1:698598635550:web:7173d8b9034521fd0fd60f",
    measurementId: "G-0JF7X9KK5E"
  };
    // ========================================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Đồng bộ tên Tab hiện tại lên ô cấu hình Admin
    database.ref('config').once('value', (snapshot) => {
        let data = snapshot.val();
        if(data) {
            if(data['tab1-name']) document.getElementById('admin-tab1-name').value = data['tab1-name'];
            if(data['tab2-name']) document.getElementById('admin-tab2-name').value = data['tab2-name'];
        }
    });

    function saveTabNames() {
        let t1 = document.getElementById('admin-tab1-name').value;
        let t2 = document.getElementById('admin-tab2-name').value;
        database.ref('config').update({ 'tab1-name': t1, 'tab2-name': t2 });
        alert("Tên Tab đã đồng bộ thành công sang trang khách!");
    }

    // Nhận thông báo tự động (Thời gian thực)
    database.ref('admin_logs').on('value', (snapshot) => {
        let logsData = snapshot.val();
        let tbody = document.getElementById('log-table-body');
        tbody.innerHTML = "";

        if(logsData) {
            Object.keys(logsData).reverse().forEach((key) => {
                let log = logsData[key];
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><small>${log.time || ''}</small></td>
                    <td><b>${log.user}</b></td>
                    <td style="color: #ffc107">${log.type}</td>
                    <td>${log.details}</td>
                    <td style="color: ${log.status === 'Chờ duyệt' ? 'orange' : '#28a745'}"><b>${log.status}</b></td>
                    <td>
                        ${log.status === 'Chờ duyệt' ? `
                            <input type="number" id="amount-${key}" placeholder="Điền số tiền cộng..." style="width:130px; padding:4px;">
                            <button class="btn-action" onclick="approveAction('${key}', '${log.user}')">Xác Nhận</button>
                        ` : '<span style="color:green">✔ Đã xử lý</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    });

    function approveAction(key, username) {
        let amountInput = document.getElementById(`amount-${key}`).value;
        if(!amountInput || amountInput <= 0) return alert("Vui lòng nhập số tiền muốn cộng cho khách!");

        let moneyToAdd = parseFloat(amountInput);

        // Lấy số tiền trên Cloud hiện tại của người này và cộng dồn thêm
        database.ref('users/' + username).once('value', (snapshot) => {
            let currentBalance = snapshot.val() || 0;
            let newBalance = currentBalance + moneyToAdd;

            // 1. Lưu số tiền mới lên Cloud
            database.ref('users/' + username).set(newBalance);

            // 2. Cập nhật lại thông báo đơn hàng thành Đã Duyệt
            database.ref('admin_logs/' + key).update({
                status: 'Đã Xác Nhận',
                details: `[Hoàn Tất] Đã cộng: +${moneyToAdd.toLocaleString('vi-VN')} VNĐ`
            });

            alert(`Thành công! Đã xử lý đơn và cộng ${moneyToAdd.toLocaleString('vi-VN')}đ cho tài khoản: ${username}`);
        });
    }
</script>
</body>
</html>
